<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Torcedor</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

    <nav>
        <a href="index.html">Início</a>
        <a href="classificacao.html">Classificação</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="resultado.html">Resultado</a>
    </nav>

    <div class="container">

        <h1>Cadastro de Torcedor 🇮🇹</h1>

        <form id="formulario">

            <label for="nome">Nome Completo</label>
            <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
                required>

            <label for="email">E-mail</label>
            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                required>

            <label for="data">Data de Nascimento</label>
            <input
                type="date"
                id="data"
                required>

            <label for="cidade">Cidade</label>
            <input
                type="text"
                id="cidade"
                placeholder="Digite sua cidade"
                required>

            <label for="estado">Estado</label>
            <input
                type="text"
                id="estado"
                placeholder="Digite seu estado"
                required>

            <label for="jogador">Jogador Favorito</label>

            <select id="jogador">

                <option>Gianluigi Donnarumma</option>
                <option>Alessandro Bastoni</option>
                <option>Federico Chiesa</option>
                <option>Nicolò Barella</option>
                <option>Jorginho</option>
                <option>Giacomo Raspadori</option>
                <option>Mateo Retegui</option>
                <option>Moise Kean</option>

            </select>

            <br><br>

            <button type="submit">
                Cadastrar
            </button>

        </form>

    </div>

    <script src="../JS/script.js"></script>

</body>

</html>
